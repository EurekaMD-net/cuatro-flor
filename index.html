<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #333;

        .controls {

<body>
    <h1>Visualizador de Harmónicos Planetarios</h1>
    <canvas id="harmonicsCanvas" width="800" height="600"></canvas>
    <div class="controls">

        const visualizer = new PlanetaryHarmonicsVisualizer();
        
        async function updateVisualization() {
            const date = document.getElementById('dateInput').value;
            
            // Aquí iría la llamada al backend para calcular armónicos
            // Por ahora, datos simulados
            const mockHarmonics = {
                'Sun': 12.45,
                'Moon': 167.89,
                'Mercury': 234.56,
                'Venus': 89.12,
                'Mars': 345.67,
                'Jupiter': 456.78,
                'Saturn': 567.89,
                'Uranus': 678.90,
                'Neptune': 789.01,
                'Pluto': 890.12
            };
            
            visualizer.draw(mockHarmonics);

        // Inicializar
        updateVisualization();
    </script>
</body>
</html>
