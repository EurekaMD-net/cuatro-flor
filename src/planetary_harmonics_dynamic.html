<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armonicos Planetarios - Cuatro Flor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff; min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; color: #F1C40F; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 14px; }
        .main-content { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        .canvas-container { 
            background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { border-radius: 10px; background: radial-gradient(circle, #1a1a2e 0%, #0d0d1a 100%); }
        .info-panel { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px; }
        .planet-card {
            background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px;
            margin-bottom: 10px; border-left: 4px solid;
        }
        .planet-name { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .planet-data { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 13px; }
        .data-label { color: #888; }
        .data-value { color: #fff; font-weight: 500; }
        .controls { 
            grid-column: 1 / -1; background: rgba(0,0,0,0.3); 
            border-radius: 15px; padding: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center;
        }
        button {
            background: #3498DB; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s;
        }
        button:hover { background: #2980B9; transform: translateY(-2px); }
        button.active { background: #27AE60; }
        input[type="range"] { width: 200px; }
        .time-display { color: #F1C40F; font-size: 16px; font-weight: bold; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Armónicos Planetarios</h1>
        <p class="subtitle">Datos en vivo desde Google Sheets - Cuatro Flor Project</p>
        
        <div class="controls">
            <button id="playPauseBtn" onclick="toggleAnimation()">⏸ Pausar</button>
            <button onclick="resetView()">🔄 Resetear Vista</button>
            <label style="color: #aaa;">Velocidad:</label>
            <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1" onchange="updateSpeed(this.value)">
            <span class="time-display" id="timeDisplay">Día 0 | 00:00:00</span>
        </div>

        <div class="main-content">
            <div class="canvas-container">
                <canvas id="orbitCanvas" width="700" height="700"></canvas>
            </div>
            <div class="info-panel" id="infoPanel"></div>
        </div>
    </div>

    <script>
        // DATOS CARGADOS DESDE GOOGLE SHEETS - CUATRO FLOR
        const PLANETS_DATA = [
            {"name": "Mercurio", "period": 87.97, "harmonic": 13, "color": "#A0A0A0"},
            {"name": "Venus", "period": 224.70, "harmonic": 9, "color": "#E67E22"},
            {"name": "Tierra", "period": 365.25, "harmonic": 1, "color": "#3498DB"},
            {"name": "Marte", "period": 686.98, "harmonic": 7, "color": "#E74C3C"},
            {"name": "Júpiter", "period": 4332.59, "harmonic": 5, "color": "#8B4513"},
            {"name": "Saturno", "period": 10759.22, "harmonic": 3, "color": "#F1C40F"}
        ];

        let planets = [];
        let isPlaying = true;
        let speedMultiplier = 1;
        let elapsedDays = 0;
        let animationId;
        const centerX = 350, centerY = 350;

        function init() {
            planets = PLANETS_DATA.map((p, i) => ({
                ...p,
                orbitRadius: 60 + (i * 55),
                angle: Math.random() * Math.PI * 2,
                frequency: 1 / p.period,
                resonantFreq: (1 / p.period) * p.harmonic,
                cyclesPerYear: 365.25 / p.period
            }));
            renderInfoPanel();
            animate();
        }

        function renderInfoPanel() {
            const panel = document.getElementById('infoPanel');
            panel.innerHTML = planets.map(p => `
                <div class="planet-card" style="border-color: ${p.color}">
                    <div class="planet-name" style="color: ${p.color}">${p.name}</div>
                    <div class="planet-data">
                        <span class="data-label">Período:</span>
                        <span class="data-value">${p.period.toFixed(2)} días</span>
                        <span class="data-label">Armónico:</span>
                        <span class="data-value">${p.harmonic}</span>
                        <span class="data-label">Frecuencia:</span>
                        <span class="data-value">${p.frequency.toExponential(2)} Hz</span>
                        <span class="data-label">Resonancia:</span>
                        <span class="data-value">${p.resonantFreq.toExponential(2)} Hz</span>
                        <span class="data-label">Ciclos/año:</span>
                        <span class="data-value">${p.cyclesPerYear.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
        }

        function drawOrbit(ctx, radius, color) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = color + '30';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawPlanet(ctx, planet) {
            const x = centerX + Math.cos(planet.angle) * planet.orbitRadius;
            const y = centerY + Math.sin(planet.angle) * planet.orbitRadius;
            
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fillStyle = planet.color;
            ctx.fill();
            ctx.shadowColor = planet.color;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff';
            ctx.font = '11px Arial';
            ctx.fillText(planet.name, x + 12, y + 4);
        }

        function update() {
            if (isPlaying) {
                elapsedDays += 0.1 * speedMultiplier;
                planets.forEach(p => {
                    p.angle += (2 * Math.PI / p.period) * 0.1 * speedMultiplier;
                });
                const days = Math.floor(elapsedDays);
                const hours = Math.floor((elapsedDays % 1) * 24);
                const mins = Math.floor(((elapsedDays % 1) * 24 % 1) * 60);
                const secs = Math.floor((((elapsedDays % 1) * 24 % 1) * 60 % 1) * 60);
                document.getElementById('timeDisplay').textContent = 
                    `Día ${days} | ${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }
        }

        function draw() {
            const canvas = document.getElementById('orbitCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            planets.forEach(p => drawOrbit(ctx, p.orbitRadius, p.color));
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#F1C40F';
            ctx.fill();
            ctx.shadowColor = '#F1C40F';
            ctx.shadowBlur = 30;
            ctx.fill();
            ctx.shadowBlur = 0;

            planets.forEach(p => drawPlanet(ctx, p));
        }

        function animate() {
            update();
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function toggleAnimation() {
            isPlaying = !isPlaying;
            document.getElementById('playPauseBtn').textContent = isPlaying ? '⏸ Pausar' : '▶ Reproducir';
        }

        function resetView() {
            elapsedDays = 0;
            planets.forEach((p, i) => p.angle = Math.random() * Math.PI * 2);
        }

        function updateSpeed(val) {
            speedMultiplier = parseFloat(val);
        }

        init();
    </script>
</body>
</html>
