<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armonías Planetarias - Cuatro Flor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 2em;
      text-align: center;
      background: linear-gradient(90deg, #f39c12, #e74c3c, #3498db, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.9em;
    }
    .container {
      display: flex;
      gap: 30px;
      max-width: 1400px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .canvas-container {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    canvas {
      border-radius: 10px;
      background: radial-gradient(circle, #1e3a5f 0%, #0f1c2e 100%);
    }
    .data-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      min-width: 350px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .planet-card {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid;
      transition: transform 0.2s;
    }
    .planet-card:hover {
      transform: translateX(5px);
      background: rgba(255,255,255,0.12);
    }
    .planet-name {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .planet-data {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      font-size: 0.85em;
      color: #ccc;
    }
    .data-label {
      color: #888;
    }
    .data-value {
      text-align: right;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2em;
      color: #f39c12;
    }
    .error {
      text-align: center;
      padding: 40px;
      font-size: 1.2em;
      color: #e74c3c;
      background: rgba(231,76,60,0.1);
      border-radius: 10px;
    }
    .timestamp {
      margin-top: 20px;
      font-size: 0.8em;
      color: #666;
      text-align: center;
    }
    button {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      margin-top: 10px;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>🌌 Armonías Planetarias</h1>
  <p class="subtitle">Datos en tiempo real desde Google Sheets - Cuatro Flor</p>
  
  <div id="content">
    <div class="loading">Cargando datos de la hoja...</div>
  </div>

  <div class="timestamp" id="timestamp"></div>
  <button onclick="loadData()">🔄 Recargar Datos</button>

  <script>
    // URL del CSV exportado desde la Google Sheet
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/11ZKjulKOPaw3xzpLof_6g5PCtxZztMslsPQlzIdJy0k/export?format=csv';
    
    let planets = [];
    let animationId = null;
    let startTime = Date.now();

    async function loadData() {
      const contentDiv = document.getElementById('content');
      contentDiv.innerHTML = '<div class="loading">Cargando datos de la hoja...</div>';
      
      try {
        const response = await fetch(CSV_URL);
        if (!response.ok) throw new Error('Error al cargar el CSV');
        const csvText = await response.text();
        
        planets = parseCSV(csvText);
        
        if (planets.length === 0) {
          throw new Error('No hay datos de planetas en la hoja');
        }
        
        renderVisualization();
        updateTimestamp();
      } catch (error) {
        contentDiv.innerHTML = `
          <div class="error">
            ❌ Error: ${error.message}<br><br>
            Asegúrate de que la Google Sheet esté pública o tenga el CSV exportado.
          </div>
        `;
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const data = [];
      
      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(',');
        if (values.length < 2 || !values[0].trim()) continue;
        
        const row = {};
        headers.forEach((header, idx) => {
          row[header] = values[idx] ? values[idx].trim() : '';
        });
        
        // Solo incluir si tiene nombre y período válido
        if (row.planeta && row.periodo_dias && !isNaN(parseFloat(row.periodo_dias))) {
          data.push({
            name: row.planeta,
            period: parseFloat(row.periodo_dias),
            harmonic: parseFloat(row.harmonico) || 1,
            frequency: parseFloat(row.frecuencia_hz) || 0,
            resonance: parseFloat(row.resonancia) || 0,
            cycles: parseFloat(row.ciclos_completados) || 0,
            color: generateColor(row.planeta)
          });
        }
      }
      
      return data;
    }

    function generateColor(name) {
      // Genera un color consistente basado en el nombre
      const colors = {
        'mercurio': '#A0A0A0',
        'venus': '#E67E22',
        'tierra': '#3498DB',
        'marte': '#E74C3C',
        'jupiter': '#8B4513',
        'saturno': '#F1C40F',
        'urano': '#00CED1',
        'neptuno': '#4169E1'
      };
      return colors[name.toLowerCase()] || 
             '#' + Math.floor(Math.abs(Math.sin(name.length * 1000)) * 16777215).toString(16).padStart(6, '0');
    }

    function renderVisualization() {
      const contentDiv = document.getElementById('content');
      contentDiv.innerHTML = `
        <div class="container">
          <div class="canvas-container">
            <canvas id="orbitCanvas" width="600" height="600"></canvas>
          </div>
          <div class="data-panel" id="dataPanel"></div>
        </div>
      `;
      
      renderPlanetCards();
      startAnimation();
    }

    function renderPlanetCards() {
      const panel = document.getElementById('dataPanel');
      panel.innerHTML = '<h2 style="margin-bottom:15px;">📊 Datos Planetarios</h2>';
      
      planets.forEach(planet => {
        const card = document.createElement('div');
        card.className = 'planet-card';
        card.style.borderColor = planet.color;
        card.innerHTML = `
          <div class="planet-name" style="color:${planet.color}">${planet.name}</div>
          <div class="planet-data">
            <span class="data-label">Período:</span>
            <span class="data-value">${planet.period.toFixed(2)} días</span>
            <span class="data-label">Armónico:</span>
            <span class="data-value">${planet.harmonic}</span>
            <span class="data-label">Frecuencia:</span>
            <span class="data-value">${planet.frequency.toExponential(2)} Hz</span>
            <span class="data-label">Resonancia:</span>
            <span class="data-value">${planet.resonance.toExponential(2)} Hz</span>
            <span class="data-label">Ciclos/año:</span>
            <span class="data-value">${planet.cycles.toFixed(2)}</span>
          </div>
        `;
        panel.appendChild(card);
      });
    }

    function startAnimation() {
      const canvas = document.getElementById('orbitCanvas');
      const ctx = canvas.getContext('2d');
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const maxRadius = Math.min(centerX, centerY) - 40;
      
      // Escalar períodos para animación visible
      const minPeriod = Math.min(...planets.map(p => p.period));
      const timeScale = minPeriod / 1000; // 1 segundo real = período más rápido
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const elapsed = (Date.now() - startTime) / 1000;
        
        // Dibujar órbitas
        planets.forEach((planet, index) => {
          const radius = 40 + (index / planets.length) * (maxRadius - 40);
          
          // Dibujar línea de órbita
          ctx.beginPath();
          ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(255,255,255,0.1)';
          ctx.lineWidth = 1;
          ctx.stroke();
          
          // Calcular posición del planeta
          const angularSpeed = (2 * Math.PI) / (planet.period * timeScale);
          const angle = (elapsed * angularSpeed) % (2 * Math.PI);
          const x = centerX + radius * Math.cos(angle);
          const y = centerY + radius * Math.sin(angle);
          
          // Dibujar planeta
          ctx.beginPath();
          ctx.arc(x, y, 8 + index * 2, 0, Math.PI * 2);
          ctx.fillStyle = planet.color;
          ctx.fill();
          
          // Brillo
          ctx.beginPath();
          ctx.arc(x, y, 12 + index * 2, 0, Math.PI * 2);
          ctx.fillStyle = planet.color + '40';
          ctx.fill();
        });
        
        // Sol en el centro
        ctx.beginPath();
        ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
        ctx.fillStyle = '#FDB813';
        ctx.fill();
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#FDB813';
        
        animationId = requestAnimationFrame(animate);
      }
      
      animate();
    }

    function updateTimestamp() {
      const now = new Date();
      document.getElementById('timestamp').textContent = 
        `Última actualización: ${now.toLocaleString('es-MX', { 
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        })} CDMX`;
    }

    // Cargar datos al iniciar
    loadData();
  </script>
</body>
</html>
