<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armónicos Planetarios - Cuatro Flor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: #e0e0ff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .control-group {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="date"], input[type="time"] {
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
        }
        button {
            padding: 10px 25px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        canvas {
            display: block;
            margin: 0 auto 30px;
            background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 100%);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .planet-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid;
        }
        .planet-card h3 { margin-bottom: 10px; font-size: 1.2em; }
        .planet-card .value { font-size: 1.4em; font-weight: bold; color: #4ecdc4; }
        .planet-card .unit { color: #888; font-size: 0.9em; }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .controls { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Armónicos Planetarios</h1>
        <p class="subtitle">Visualización de frecuencias armónicas basadas en distancias planetarias</p>
        
        <div class="controls">
            <div class="control-group">
                <label for="dateInput">Fecha:</label>
                <input type="date" id="dateInput">
            </div>
            <div class="control-group">
                <label for="timeInput">Hora:</label>
                <input type="time" id="timeInput">
            </div>
            <div class="control-group" style="display:flex;align-items:flex-end;">
                <button onclick="updateVisualization()">Actualizar</button>
            </div>
        </div>

        <canvas id="harmonicsCanvas" width="900" height="500"></canvas>

        <div class="data-grid" id="dataGrid"></div>
    </div>

    <script>
        // Datos planetarios base (distancias medias al Sol en millones de km)
        const planets = [
            { name: 'Mercurio', distance: 57.9, color: '#b5b5b5' },
            { name: 'Venus', distance: 108.2, color: '#e6c87a' },
            { name: 'Tierra', distance: 149.6, color: '#4ecdc4' },
            { name: 'Marte', distance: 227.9, color: '#ff6b6b' },
            { name: 'Júpiter', distance: 778.5, color: '#d4a574' },
            { name: 'Saturno', distance: 1432, color: '#f4d03f' },
            { name: 'Urano', distance: 2867, color: '#7de3f4' },
            { name: 'Neptuno', distance: 4515, color: '#5b7fde' },
            { name: 'Plutón', distance: 5906, color: '#9b8b7e' }
        ];

        // Frecuencia base de referencia (Hz)
        const BASE_FREQ = 261.63; // Do central (C4)

        function calculateHarmonic(distance) {
            // Escalar distancia a frecuencia usando ley de potencias inversas
            const earthDistance = 149.6;
            const ratio = earthDistance / distance;
            const harmonic = BASE_FREQ * Math.pow(ratio, 0.5);
            return harmonic;
        }

        function frequencyToNote(freq) {
            const notes = ['Do', 'Do#', 'Re', 'Re#', 'Mi', 'Fa', 'Fa#', 'Sol', 'Sol#', 'La', 'La#', 'Si'];
            const A4 = 440;
            const semitones = 12 * Math.log2(freq / A4) + 69;
            const noteIndex = Math.round(semitones) % 12;
            const octave = Math.floor(Math.round(semitones) / 12) - 1;
            return `${notes[noteIndex]}${octave}`;
        }

        function drawVisualization() {
            const canvas = document.getElementById('harmonicsCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;

            ctx.clearRect(0, 0, width, height);

            // Dibujar fondo estelar
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                const size = Math.random() * 2;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Dibujar órbitas y planetas
            const maxDistance = Math.max(...planets.map(p => p.distance));
            
            planets.forEach((planet, index) => {
                const orbitRadius = (planet.distance / maxDistance) * (Math.min(width, height) / 2 - 40);
                
                // Dibujar órbita
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
                ctx.stroke();

                // Calcular posición angular basada en fecha/hora
                const now = new Date();
                const angle = (now.getTime() / 1000) * 0.0001 * (index + 1) + (index * Math.PI / 4);
                const x = centerX + Math.cos(angle) * orbitRadius;
                const y = centerY + Math.sin(angle) * orbitRadius;

                // Dibujar planeta
                const freq = calculateHarmonic(planet.distance);
                const amplitude = Math.min(30, Math.max(8, freq / 50));
                
                ctx.fillStyle = planet.color;
                ctx.beginPath();
                ctx.arc(x, y, amplitude, 0, Math.PI * 2);
                ctx.fill();

                // Glow effect
                const gradient = ctx.createRadialGradient(x, y, amplitude * 0.5, x, y, amplitude * 2);
                gradient.addColorStop(0, planet.color + '80');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, amplitude * 2, 0, Math.PI * 2);
                ctx.fill();

                // Label
                ctx.fillStyle = '#fff';
                ctx.font = '12px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText(planet.name, x, y - amplitude - 8);
            });

            // Centro (Sol)
            const sunGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 40);
            sunGradient.addColorStop(0, '#ffd700');
            sunGradient.addColorStop(0.5, '#ff8c00');
            sunGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = sunGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        function updateDataGrid() {
            const grid = document.getElementById('dataGrid');
            grid.innerHTML = '';

            planets.forEach(planet => {
                const freq = calculateHarmonic(planet.distance);
                const note = frequencyToNote(freq);
                
                const card = document.createElement('div');
                card.className = 'planet-card';
                card.style.borderColor = planet.color;
                card.innerHTML = `
                    <h3 style="color:${planet.color}">${planet.name}</h3>
                    <div class="value">${freq.toFixed(2)} <span class="unit">Hz</span></div>
                    <div style="color:#888;margin-top:5px;">Nota: ${note}</div>
                    <div style="color:#666;font-size:0.85em;margin-top:3px;">Distancia: ${planet.distance} Mkm</div>
                `;
                grid.appendChild(card);
            });
        }

        function updateVisualization() {
            drawVisualization();
            updateDataGrid();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            document.getElementById('dateInput').value = now.toISOString().split('T')[0];
            document.getElementById('timeInput').value = now.toTimeString().slice(0, 5);
            
            updateVisualization();
            
            // Auto-update cada 30 segundos
            setInterval(drawVisualization, 30000);
        });
    </script>
</body>
</html>
